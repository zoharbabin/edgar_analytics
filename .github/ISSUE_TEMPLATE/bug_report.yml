name: Bug Report
description: Report a bug or incorrect data in EDGAR Analytics
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
      placeholder: "When I run edgar-analytics AAPL, the Net Margin % is ..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the issue.
      value: |
        ```bash
        edgar-analytics TICKER
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `pip show edgar-analytics | grep Version`"
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: "Output of `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
