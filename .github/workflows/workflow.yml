name: Test & Publish to PyPI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project with test extras
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[test]

      - name: Create EDGAR data directory
        run: mkdir -p /home/runner/.edgar

      - name: Run tests
        run: pytest --maxfail=3 --disable-warnings -v -n auto

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ test ]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build

      - name: Publish via OIDC to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          package-name: "edgar-analytics"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
