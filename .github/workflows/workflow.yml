name: Test & Publish to PyPI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project with test extras
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[test]

      - name: Create EDGAR data directory
        run: mkdir -p /home/runner/.edgar

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check edgar_analytics/ tests/ --select E,F,W --ignore E501

      - name: Type check (mypy)
        run: |
          pip install mypy pandas-stubs types-requests
          mypy edgar_analytics/ --ignore-missing-imports --no-error-summary

      - name: Run tests
        run: pytest --maxfail=3 --disable-warnings -v -n auto

  integration-test:
    name: Integration Tests (EDGAR API)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project with test extras
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[test]

      - name: Create EDGAR data directory
        run: mkdir -p /home/runner/.edgar

      - name: Run integration tests
        run: pytest -m integration --run-integration --maxfail=3 -v --timeout=120
        env:
          EDGAR_IDENTITY: "edgar-analytics-ci <edgar-analytics@users.noreply.github.com>"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ test ]
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build

      - name: Publish via OIDC to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
